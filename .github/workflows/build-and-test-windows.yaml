name: Windows build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    strategy:
      fail-fast: false
      matrix:
        config:
          - { compiler: "clang", package: "llvm", version: "22.1.0" }
          - { compiler: "gcc", package: "mingw", version: "15.2.0" }

    name: "${{ matrix.config.compiler }} ${{ matrix.config.version }} (C23, Release)"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.47.1"

      - name: Install compiler
        run: choco install ${{ matrix.config.package }} --version ${{ matrix.config.version }} -y

      - name: Install dependencies
        run: just install-deps

      - name: Build
        run: just build -p release -c ${{ matrix.config.compiler }}

      - name: Unit tests
        run: just unit-test -p release

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: E2E tests
        run: just e2e-test -p release
