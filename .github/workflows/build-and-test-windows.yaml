name: Windows build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    strategy:
      fail-fast: false
      matrix:
        config:
          - { version: "22.1.0", std: 23 }

    name: "clang ${{ matrix.config.version }} (C${{ matrix.config.std }}, Release)"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Just
        run: choco install just --version 1.50.0

      - name: Install dependencies
        run: just install-deps

      - name: Build
        run: just build -p release

      - name: Unit tests
        run: just unit-test -p release

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: E2E tests
        run: just e2e-test -p release
