name: Windows build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    strategy:
      fail-fast: false
      matrix:
        config:
          - { version: "22.1.0", std: 23, build_type: Release }

    name: "clang ${{ matrix.config.version }} (C${{ matrix.config.std }}, ${{ matrix.config.build_type }})"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Just
        run: choco install just --version 1.50.0

      - name: Install dependencies
        run: just install-deps

      - name: Build
        run: just build -p win-${{ toLowerCase(matrix.config.build_type) }}
