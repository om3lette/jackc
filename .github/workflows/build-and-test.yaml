name: Build and test

on: [push]

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        config:
          - { compiler: gcc, version: 14, std: 23, build_type: Release }
          - { compiler: clang, version: 20, std: 23, build_type: Release }

    name: "${{matrix.config.compiler}} ${{matrix.config.version}} (C${{matrix.config.std}}, ${{matrix.config.build_type}})"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Just
        uses: extractions/setup-just@v4
        with:
          just-version: '1.47.1'

      - name: Setup compiler and build system
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.config.compiler }}-${{ matrix.config.version }}
          cmake: 3.31.6
          ninja: true

      - name: Build
        run: just build -p release

      - name: Unit tests
        run: just unit-test -p release

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Integration tests
        run: just integration-test -p release
